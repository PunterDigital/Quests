name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref to save runner time.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: [self-hosted, linux]

    env:
      # Prisma requires DATABASE_URL to be present to generate the client and
      # for `next build`. No database is contacted during the build — the API
      # routes are force-dynamic and the page is client-rendered — so a dummy
      # value is sufficient here.
      DATABASE_URL: postgresql://user:pass@localhost:5432/db?schema=public
      # Skip Next.js anonymous telemetry on CI.
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
